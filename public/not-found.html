<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Product Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 32px;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #2a1f2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .message {
      text-align: center;
    }

    .message h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f0f0f5;
    }

    .message p {
      font-size: 15px;
      color: #8a8fa8;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 16px;
      background: #7c8cf8;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .btn:active { background: #6070e8; }
  </style>
</head>
<body>
  <div class="icon">🔍</div>
  <div class="message">
    <h1>Product not found</h1>
    <p>This barcode isn't in the database.<br>Try scanning again or check the barcode.</p>
  </div>
  <a href="/" class="btn">Scan Again</a>
</body>
</html>
